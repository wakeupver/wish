name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --legacy-peer-deps
          npm rebuild sharp

      - name: Determine base path
        id: base_path
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          # User/org page: repo harus bernama username.github.io → base path kosong
          if [[ "$REPO_NAME" == "$OWNER.github.io" ]]; then
            echo "base=" >> $GITHUB_OUTPUT
          else
            echo "base=/$REPO_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base_path.outputs.base }}
          VITE_APP_TITLE: 'Genshin Impact Wish Simulator'
          VITE_DESCRIPTION: 'Realistic Genshin Impact Wish Simulator, Unlimited Gacha, 100% running on browser'
          VITE_HOST: 'https://${{ github.repository_owner }}.github.io${{ steps.base_path.outputs.base }}'

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
